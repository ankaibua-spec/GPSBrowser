name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPSBrowser-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Extract version info
        id: version
        run: |
          # Dung sed regex chinh xac, khong phu thuoc whitespace
          VERSION_CODE=$(sed -n 's/^[[:space:]]*versionCode[[:space:]]\+\([0-9]\+\).*/\1/p' app/build.gradle | head -1)
          VERSION_NAME=$(sed -n 's/^[[:space:]]*versionName[[:space:]]\+"\([^"]*\)".*/\1/p' app/build.gradle | head -1)
          if [ -z "$VERSION_CODE" ] || [ -z "$VERSION_NAME" ]; then
            echo "ERROR: Cannot extract version from build.gradle"
            exit 1
          fi
          echo "code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Generate version.json
        env:
          VERSION_NAME: ${{ steps.version.outputs.name }}
          VERSION_CODE: ${{ steps.version.outputs.code }}
        run: |
          # Dung jq de safe escape JSON (handle quotes, backslash, newline, control chars)
          CHANGELOG=$(git log -1 --pretty=%B | head -10)
          jq -n \
            --arg version "$VERSION_NAME" \
            --argjson versionCode "$VERSION_CODE" \
            --arg url "http://31.97.189.245/dl/GPSBrowser.apk" \
            --arg changelog "$CHANGELOG" \
            '{version: $version, versionCode: $versionCode, url: $url, changelog: $changelog}' \
            > gpsbrowser_version.json
          cat gpsbrowser_version.json

      - name: Publish APK + version.json to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_SSH_KEY" ]; then
            echo "VPS_SSH_KEY secret not set, skipping publish"
            exit 0
          fi
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 31.97.189.245 >> ~/.ssh/known_hosts 2>/dev/null
          scp -o StrictHostKeyChecking=no app/build/outputs/apk/debug/app-debug.apk root@31.97.189.245:/tmp/GPSBrowser.apk
          scp -o StrictHostKeyChecking=no gpsbrowser_version.json root@31.97.189.245:/tmp/gpsbrowser_version.json
          ssh -o StrictHostKeyChecking=no root@31.97.189.245 "chmod 644 /tmp/GPSBrowser.apk /tmp/gpsbrowser_version.json"
          echo "Published: http://31.97.189.245/dl/GPSBrowser.apk"
